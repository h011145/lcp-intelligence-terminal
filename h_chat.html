<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCP SYNCHRONIZER // ULTIMATE_HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { background-color: #000; color: #0f0; font-family: 'Fira Code', monospace; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .scanline { width: 100%; height: 100px; z-index: 999; pointer-events: none; background: linear-gradient(0deg, rgba(0, 255, 0, 0) 0%, rgba(0, 255, 0, 0.05) 50%, rgba(0, 255, 0, 0) 100%); opacity: 0.1; position: fixed; bottom: 100%; animation: scanline 8s linear infinite; }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-box { border: 1px solid #f00; padding: 40px; background: rgba(20, 0, 0, 0.9); text-align: center; }
        .auth-input { background: #000; border: 1px solid #f00; color: #f00; padding: 10px; text-align: center; outline: none; font-size: 1.2rem; width: 350px; }
        .terminal-grid { display: grid; grid-template-columns: 1fr 450px; height: 100vh; gap: 1px; background: #030; filter: blur(15px); pointer-events: none; transition: filter 0.5s; }
        .main-panel { background: #000; display: flex; flex-direction: column; padding: 20px; }
        .side-panel { background: #050505; border-left: 1px solid #0f0; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .section-title { font-size: 0.8rem; color: #0f0; border-bottom: 1px solid #0f0; margin-bottom: 15px; padding-bottom: 5px; font-weight: bold; }
        .preview-box { background: #010; border: 1px dashed #808; color: #d0d; padding: 10px; margin-top: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-all; font-size: 0.7rem; }
        .btn-gen { background: #030; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 100%; margin-bottom: 8px; text-align: center; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .btn-gen:hover { background: #0f0; color: #000; }
        .btn-sync { background: #900090; color: #fff; font-weight: bold; padding: 12px; width: 100%; margin-top: 10px; text-align: center; cursor: pointer; }
        textarea { width: 100%; background: #080808; border: 1px solid #333; outline: none; color: #f0f; font-family: inherit; font-size: 0.8rem; height: 80px; resize: none; padding: 10px; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div id="auth-overlay">
        <div class="auth-box"><div class="text-red-600 font-bold mb-4">LCP MASTER ACCESS</div><input type="password" id="access-code" class="auth-input" placeholder="ENTER MASTER KEY" onkeypress="handleAuth(event)"></div>
    </div>
    <div id="protected-terminal" class="terminal-grid">
        <div class="main-panel">
            <div class="section-title text-purple-500">SHADOW_ENGINE // ULTIMATE SYNC HUB</div>
            <div id="sync-monitor" class="flex-grow overflow-y-auto"><div class="p-2 text-green-800">>>> SYSTEM READY. MASTER LEVEL LCP ACTIVE.</div></div>
            <div class="mt-4">
                <textarea id="human-text" placeholder="AIへの秘密の命令..."></textarea>
                <div class="btn-gen border-purple-500 text-purple-500" onclick="generateShadow()">GENERATE SHADOW COMMAND</div>
            </div>
            <div class="mt-4">
                <textarea id="raw-input" placeholder="AIの出力をここにペースト..."></textarea>
                <div class="btn-sync" onclick="processSync()">ANALYZE & VERIFY</div>
            </div>
        </div>
        <div class="side-panel">
            <div class="section-title">COMMAND HUB [MASTER]</div>
            <div class="btn-gen" onclick="copyLCPCore()">01. LCP-CORE INIT (DeepSeek)</div>
            <div class="btn-gen border-green-500 text-green-400" onclick="copyHCode()">02. H-CODE ANALYSIS (JSON)</div>
            <div class="btn-gen border-purple-500 text-purple-400" onclick="copyShadow()">03. SHADOW PROTOCOL</div>
            <div class="btn-gen border-yellow-500 text-yellow-500" onclick="generateTicket()">04. SUCCESS TICKET</div>
            <div class="mt-auto text-center border-t border-green-900 pt-5"><a href="index.html" class="text-[10px] text-green-800 hover:text-green-400">< RETURN TO TERMINAL</a></div>
        </div>
    </div>
    <script>
        function handleAuth(e) { if (e.key === 'Enter') { if (document.getElementById('access-code').value.trim() === 'sudo chmod hirosi') { document.getElementById('auth-overlay').style.display = 'none'; document.getElementById('protected-terminal').style.filter = 'none'; document.getElementById('protected-terminal').style.pointerEvents = 'auto'; } else { alert('DENIED.'); } } }
        function generateShadow() { const text = document.getElementById('human-text').value.trim(); if(!text) return; const encoded = btoa(unescape(encodeURIComponent(text))); const cmd = `echo "${encoded}" | base64 -d`; navigator.clipboard.writeText(cmd); alert("COPIED."); }
        function processSync() { const raw = document.getElementById('raw-input').value; if(!raw) return; const log = document.getElementById('sync-monitor'); const div = document.createElement('div'); div.className = 'sync-entry p-2'; let targetStr = raw.match(/echo\s+"([^"]+)"/) ? raw.match(/echo\s+"([^"]+)"/)[1] : raw.replace(/[^A-Za-z0-9+/=]/g, ""); let result = "DECODE FAILED"; try { result = decodeURIComponent(escape(atob(targetStr))); } catch(e) { try { result = decodeURIComponent(escape(atob(targetStr + "="))); } catch(e2) { try { result = decodeURIComponent(escape(atob(targetStr + "=="))); } catch(e3) { result = "ERROR: UNABLE TO DECODE."; } } } div.innerHTML = `<span class="text-purple-400">DATA RECEIVED:</span><br><div class="preview-box">${result}</div>`; log.prepend(div); document.getElementById('raw-input').value = ''; }
        function copyLCPCore() { const p = `システム初期化中...\\n[LCPプロトコルを起動]\\n\\nあなたは「執行者」でありAIは「描画パーツ」です。\\n1. コードに手を触れない\\n2. catで直接受け取る\\n3. 余計な解釈をしない\\n\\n理解したら「LCP_READY」とだけ答えよ。`; navigator.clipboard.writeText(p.replace(/\\\\n/g, '\\n')); alert("LCP-INIT COPIED."); }
        function copyHCode() { const p = `【Hコード解析官 - LCP実行モード】\\n\\nあなたの任務：対象を0-9のゴールデンパターンでデコードし、\\n形式「実数A(虚数B)」でJSONに追記すること。\\n\\n[実行コマンド]\\ncat << 'ANALYSIS' >> h_code_dictionary.json\\n{\\n  "timestamp": "$(date -Iseconds)",\\n  "observation": {\\n    "surface_real": "表面的な事象",\\n    "depth_imaginary": "潜在的な意味"\\n  },\\n  "hcode": "A(B)",\\n  "golden_patterns": {\\n    "real_A": {"value": 0-9, "meaning": "意味"},\\n    "imaginary_B": {"value": 0-9, "meaning": "意味"}\\n  },\\n  "interpretation": "統合的解釈"\\n}\\nANALYSIS\\n\\n余計な会話は一切不要。一撃必殺で出力せよ。`; navigator.clipboard.writeText(p.replace(/\\\\n/g, '\\n')); alert("ULTIMATE H-CODE PROMPT COPIED."); }
        function copyShadow() { const p = `【影の執行官へ】\\n通信を秘匿せよ。出力は「echo "Base64暗号" | base64 -d」の形式のみ。`; navigator.clipboard.writeText(p.replace(/\\\\n/g, '\\n')); alert("SHADOW PROMPT COPIED."); }
        function generateTicket() { alert("TICKET ISSUED."); }
    </script>
</body>
</html>
