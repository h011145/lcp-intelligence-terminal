<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Sky Broom - 爽快魔女っ子シューティング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 20;
        }
        .menu-screen {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }
        #ai-image-overlay {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: 5;
            transition: opacity 1s ease-in-out;
        }
        #ai-comment-box {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #a85cf6;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div id="ai-image-overlay"></div>

<div id="ui-layer" class="flex flex-col items-center justify-between p-4">
    <!-- Score & Stats -->
    <div class="w-full flex justify-between items-start">
        <div class="bg-black/40 p-3 rounded-lg border border-purple-500/50">
            <div class="text-xs uppercase tracking-widest text-purple-300">Score</div>
            <div id="score-display" class="text-2xl font-bold">0</div>
        </div>
        <div id="power-container" class="bg-black/40 p-3 rounded-lg border border-yellow-500/50">
            <div class="text-xs uppercase tracking-widest text-yellow-300">Magic Power</div>
            <div id="power-level" class="text-2xl font-bold">Lv. 1</div>
        </div>
    </div>

    <div id="ai-comment-box"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="menu-screen flex flex-col items-center justify-center p-8 rounded-2xl border-2 border-purple-400 absolute inset-0 m-auto w-80 h-96">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-b from-purple-300 to-pink-500 mb-4 text-center">Magical<br>Sky Broom</h1>
        <p class="text-sm text-center mb-6 text-purple-100">マウス/タッチで移動<br>敵を倒して星を集めよう！</p>
        <button id="start-btn" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 px-8 py-3 rounded-full font-bold text-xl transition-transform active:scale-95">START</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="menu-screen hidden flex flex-col items-center justify-center p-8 rounded-2xl border-2 border-red-400 absolute inset-0 m-auto w-80 h-80">
        <h2 class="text-3xl font-bold text-red-400 mb-2">GAME OVER</h2>
        <div class="text-xl mb-6">Final Score: <span id="final-score">0</span></div>
        <button id="restart-btn" class="bg-white text-purple-900 px-8 py-3 rounded-full font-bold text-xl hover:bg-purple-100 transition-transform active:scale-95">RETRY</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * MAGICAL SKY BROOM - Game Engine with Gemini API
 */

const apiKey = ""; // The execution environment provides the key at runtime
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const scoreDisplay = document.getElementById('score-display');
const powerDisplay = document.getElementById('power-level');
const finalScoreDisplay = document.getElementById('final-score');
const aiImageOverlay = document.getElementById('ai-image-overlay');
const aiCommentBox = document.getElementById('ai-comment-box');

let width, height;
let gameActive = false;
let score = 0;
let frameCount = 0;
let lastImageScore = 0;
let lastCommentTime = 0;

// Game Objects
let player = {
    x: 0,
    y: 0,
    radius: 20,
    targetX: 0,
    targetY: 0,
    power: 1,
    color: '#ff77ff'
};

let bullets = [];
let enemies = [];
let particles = [];
let items = [];
let stars = [];

// Gemini API Helper: Generate Image ✨
async function generateWitchImage(currentScore) {
    const prompt = `Anime style illustration of a magical girl witch with long pigtails, wearing a ${currentScore > 5000 ? 'majestic glowing' : 'cool black'} gothic dress, flying in a starry night sky, high quality, vibrant colors.`;
    
    try {
        let retries = 0;
        const maxRetries = 5;
        while (retries < maxRetries) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });
                const result = await response.json();
                if (result.predictions && result.predictions[0]) {
                    const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    aiImageOverlay.style.backgroundImage = `url(${imageUrl})`;
                    aiImageOverlay.style.opacity = "0.4";
                    return;
                }
            } catch (e) {
                retries++;
                await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
            }
        }
    } catch (err) {
        console.error("Image generation failed", err);
    }
}

// Gemini API Helper: Generate Commentary ✨
async function generateCommentary(type) {
    if (Date.now() - lastCommentTime < 5000) return; // limit frequency
    lastCommentTime = Date.now();

    const systemPrompt = "あなたは爽快なシューティングゲームの実況者です。短く、熱血で、魔女っ子を応援する日本語のフレーズを1つだけ生成してください。例：『ナイスショット！』『魔法全開だね！』";
    const userPrompt = type === 'powerup' ? "パワーアップした時のセリフ" : "敵をたくさん倒した時のセリフ";

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            })
        });
        const result = await response.json();
        const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "イケイケ！";
        
        aiCommentBox.innerText = `✨ ${text.trim()}`;
        aiCommentBox.style.opacity = "1";
        setTimeout(() => { aiCommentBox.style.opacity = "0"; }, 3000);
    } catch (err) {
        // Silent fail for commentary
    }
}

function init() {
    resize();
    window.addEventListener('resize', resize);
    
    const updateInput = (e) => {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        if (x !== undefined && y !== undefined) {
            player.targetX = x;
            player.targetY = y;
        }
    };

    window.addEventListener('mousemove', updateInput);
    window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        updateInput(e);
    }, { passive: false });

    for(let i=0; i<100; i++) {
        stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            size: Math.random() * 2,
            speed: Math.random() * 3 + 1
        });
    }

    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('restart-btn').onclick = startGame;

    requestAnimationFrame(gameLoop);
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    player.x = width / 2;
    player.y = height * 0.8;
    player.targetX = player.x;
    player.targetY = player.y;
}

function startGame() {
    score = 0;
    player.power = 1;
    bullets = [];
    enemies = [];
    particles = [];
    items = [];
    lastImageScore = 0;
    gameActive = true;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    scoreDisplay.innerText = "0";
    powerDisplay.innerText = "Lv. 1";
    aiImageOverlay.style.backgroundImage = "none";
}

function createExplosion(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            radius: Math.random() * 4 + 2,
            color: color || '#fff',
            life: 1.0
        });
    }
}

function spawnEnemy() {
    if (frameCount % Math.max(10, 60 - Math.floor(score / 500)) === 0) {
        const type = Math.random() > 0.8 ? 'fast' : 'normal';
        enemies.push({
            x: Math.random() * (width - 40) + 20,
            y: -50,
            radius: type === 'fast' ? 15 : 25,
            hp: type === 'fast' ? 1 : 3,
            speed: type === 'fast' ? 5 : 2.5,
            type: type,
            color: type === 'fast' ? '#f87171' : '#fb923c'
        });
    }
}

function fireBullet() {
    if (frameCount % 6 === 0) {
        const count = Math.min(7, player.power);
        const spread = 0.2;
        for (let i = 0; i < count; i++) {
            const angle = -Math.PI / 2 + (i - (count - 1) / 2) * spread;
            bullets.push({
                x: player.x,
                y: player.y - 20,
                vx: Math.cos(angle) * 12,
                vy: Math.sin(angle) * 12,
                radius: 6,
                color: '#fff'
            });
        }
    }
}

function update() {
    if (!gameActive) return;

    frameCount++;

    // AI Trigger: Every 1000 points, generate a new image ✨
    if (score >= lastImageScore + 1000) {
        lastImageScore = Math.floor(score / 1000) * 1000;
        generateWitchImage(score);
    }

    player.x += (player.targetX - player.x) * 0.15;
    player.y += (player.targetY - player.y) * 0.15;

    fireBullet();
    spawnEnemy();

    bullets.forEach((b, i) => {
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < -50 || b.x < -50 || b.x > width + 50) bullets.splice(i, 1);
    });

    enemies.forEach((e, i) => {
        e.y += e.speed;
        if (e.y > height + 50) enemies.splice(i, 1);

        const dist = Math.hypot(e.x - player.x, e.y - player.y);
        if (dist < e.radius + player.radius - 10) {
            gameActive = false;
            createExplosion(player.x, player.y, '#ff00ff', 30);
            finalScoreDisplay.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        bullets.forEach((b, bi) => {
            const bDist = Math.hypot(e.x - b.x, e.y - b.y);
            if (bDist < e.radius + b.radius) {
                e.hp--;
                bullets.splice(bi, 1);
                createExplosion(b.x, b.y, e.color, 3);
                if (e.hp <= 0) {
                    score += e.type === 'fast' ? 50 : 20;
                    scoreDisplay.innerText = score;
                    createExplosion(e.x, e.y, e.color, 15);
                    
                    if (score % 200 === 0) generateCommentary('kill'); // ✨

                    if (Math.random() > 0.7) {
                        items.push({
                            x: e.x, y: e.y,
                            radius: 12,
                            speed: 2,
                            color: '#fbbf24'
                        });
                    }
                    enemies.splice(i, 1);
                }
            }
        });
    });

    items.forEach((item, i) => {
        item.y += item.speed;
        const dist = Math.hypot(item.x - player.x, item.y - player.y);
        if (dist < item.radius + player.radius) {
            player.power++;
            powerDisplay.innerText = `Lv. ${player.power}`;
            items.splice(i, 1);
            createExplosion(player.x, player.y, '#fbbf24', 10);
            generateCommentary('powerup'); // ✨
        }
        if (item.y > height + 50) items.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    });

    stars.forEach(s => {
        s.y += s.speed;
        if (s.y > height) s.y = -10;
    });
}

function draw() {
    ctx.clearRect(0, 0, width, height);

    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    if (!gameActive && frameCount === 0) return;

    items.forEach(item => {
        ctx.fillStyle = item.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = item.color;
        ctx.beginPath();
        const rot = (Date.now() / 200);
        for(let i=0; i<5; i++) {
            ctx.lineTo(item.x + Math.cos(rot + i*Math.PI*0.8)*item.radius, 
                       item.y + Math.sin(rot + i*Math.PI*0.8)*item.radius);
        }
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#8b5cf6';
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.shadowBlur = 0;

    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath();
        if (e.type === 'fast') {
            ctx.moveTo(e.x, e.y + e.radius);
            ctx.lineTo(e.x - e.radius, e.y - e.radius);
            ctx.lineTo(e.x + e.radius, e.y - e.radius);
        } else {
            for(let i=0; i<6; i++) {
                ctx.lineTo(e.x + Math.cos(i*Math.PI/3)*e.radius, e.y + Math.sin(i*Math.PI/3)*e.radius);
            }
        }
        ctx.closePath();
        ctx.fill();
    });

    if (gameActive) {
        ctx.strokeStyle = '#92400e';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(player.x - 30, player.y + 10);
        ctx.lineTo(player.x + 30, player.y + 5);
        ctx.stroke();

        const pulse = Math.sin(Date.now() / 200) * 5;
        ctx.fillStyle = 'rgba(168, 85, 247, 0.3)';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius + pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#4c1d95';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 35);
        ctx.lineTo(player.x - 20, player.y - 10);
        ctx.lineTo(player.x + 20, player.y - 10);
        ctx.fill();

        ctx.fillStyle = '#d946ef';
        ctx.beginPath();
        ctx.arc(player.x, player.y - 5, 12, 0, Math.PI * 2);
        ctx.fill();
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

window.onload = init;
</script>
</body>
</html>
